<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worktree Topology</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f5f5f7;
            color: #1d1d1f;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }
        #canvas:active { cursor: grabbing; }

        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 52px;
            background: rgba(245,245,247,0.85);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            pointer-events: none;
        }
        .nav-left { display: flex; align-items: center; gap: 12px; pointer-events: auto; }
        .nav-icon {
            width: 28px; height: 28px; background: #1d1d1f; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-icon svg { width: 16px; height: 16px; color: #f5f5f7; }
        .nav-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
        .nav-subtitle { font-size: 13px; color: #86868b; font-weight: 400; margin-left: 6px; }
        .nav-right { font-size: 13px; color: #86868b; font-weight: 500; pointer-events: auto; }

        .toolbar {
            position: fixed;
            bottom: 28px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: center; gap: 8px;
            z-index: 10;
            background: rgba(255,255,255,0.72);
            backdrop-filter: saturate(180%) blur(20px);
            padding: 8px;
            border-radius: 16px;
            border: 1px solid rgba(0,0,0,0.06);
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
        }
        .toolbar button {
            background: transparent; border: none; color: #1d1d1f;
            padding: 10px 18px; border-radius: 12px; cursor: pointer;
            font-size: 13px; font-weight: 500; letter-spacing: -0.01em;
            transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
            display: flex; align-items: center; gap: 6px;
            font-family: inherit;
        }
        .toolbar button:hover { background: rgba(0,0,0,0.04); }
        .toolbar button:active { transform: scale(0.96); }
        .toolbar button.primary { background: #0071e3; color: white; }
        .toolbar button.primary:hover { background: #0077ed; }
        .toolbar button.danger { color: #ff3b30; }
        .toolbar button.danger:hover { background: rgba(255,59,48,0.06); }
        .toolbar-divider { width: 1px; height: 20px; background: rgba(0,0,0,0.06); margin: 0 4px; }

        .info-panel {
            position: fixed; top: 72px; right: 20px;
            width: 280px;
            background: rgba(255,255,255,0.72);
            backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid rgba(0,0,0,0.06);
            border-radius: 18px; padding: 20px;
            z-index: 10;
            box-shadow: 0 12px 40px rgba(0,0,0,0.08);
            opacity: 0; transform: translateX(12px) scale(0.98);
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            pointer-events: none;
        }
        .info-panel.active { opacity: 1; transform: translateX(0) scale(1); pointer-events: all; }
        .info-panel-header { margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(0,0,0,0.06); }
        .info-panel h3 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
        .info-panel .meta { font-size: 12px; color: #86868b; margin-top: 4px; }
        .info-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; }
        .info-row .label { color: #86868b; font-weight: 400; }
        .info-row .value { color: #1d1d1f; font-weight: 500; text-align: right; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-variant-numeric: tabular-nums; }
        .branch-tag { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; letter-spacing: -0.01em; }
        .status-pill { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 100px; font-size: 11px; font-weight: 500; }
        .status-clean { background: rgba(52,199,89,0.1); color: #34c759; }
        .status-dirty { background: rgba(255,149,0,0.1); color: #ff9500; }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; }
        .status-clean .status-dot { background: #34c759; }
        .status-dirty .status-dot { background: #ff9500; }

        .hint { position: fixed; bottom: 28px; right: 24px; font-size: 11px; color: #a1a1a6; font-weight: 400; z-index: 5; user-select: none; pointer-events: none; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(8px); background: rgba(29,29,31,0.9); backdrop-filter: blur(10px); color: white; padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 500; z-index: 1000; opacity: 0; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-left">
            <div class="nav-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7" rx="1"/>
                    <rect x="14" y="3" width="7" height="7" rx="1"/>
                    <rect x="3" y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
            </div>
            <span class="nav-title">Worktree Grid</span>
            <span class="nav-subtitle">自动树形拓扑</span>
        </div>
        <div class="nav-right" id="navCount">4 个工作树</div>
    </nav>

    <div class="info-panel" id="infoPanel">
        <div class="info-panel-header">
            <h3 id="panelTitle">Worktree</h3>
            <div class="meta" id="panelSubtitle">单元格节点</div>
        </div>
        <div class="info-row"><span class="label">分支</span><span class="value" id="panelBranch">-</span></div>
        <div class="info-row"><span class="label">路径</span><span class="value" id="panelPath">-</span></div>
        <div class="info-row"><span class="label">HEAD</span><span class="value" id="panelHead">-</span></div>
        <div class="info-row"><span class="label">状态</span><span class="value" id="panelStatus">-</span></div>
        <div class="info-row"><span class="label">未跟踪</span><span class="value" id="panelUntracked">-</span></div>
        <div class="info-row"><span class="label">已修改</span><span class="value" id="panelModified">-</span></div>
    </div>

    <div class="toolbar">
        <button class="primary" onclick="addNode()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            添加节点
        </button>
        <div class="toolbar-divider"></div>
        <button class="danger" onclick="removeNode()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                <line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/>
            </svg>
            删除选中
        </button>
    </div>

    <div class="hint">滚动缩放 · 点击选中 · 双击切换</div>
    <div class="toast" id="toast"></div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        const CELL = 52;
        const GAP = 1;

        let width, height;
        let nodes = [];
        let selectedNode = null;
        let hoveredNode = null;
        let camera = { x: 0, y: 0, zoom: 1, targetZoom: 1 };
        let isPanning = false;
        let panStart = { x: 0, y: 0 };
        let nodeCounter = 4;

        const BRANCH_COLORS = {
            'main':    { dot: '#0071e3', bg: 'rgba(0,113,227,0.12)', text: '#0071e3' },
            'master':  { dot: '#0071e3', bg: 'rgba(0,113,227,0.12)', text: '#0071e3' },
            'feature': { dot: '#22c55e', bg: 'rgba(34,197,94,0.12)', text: '#22c55e' },
            'hotfix':  { dot: '#ef4444', bg: 'rgba(239,68,68,0.12)', text: '#ef4444' },
            'develop': { dot: '#a855f7', bg: 'rgba(168,85,247,0.12)', text: '#a855f7' },
            'release': { dot: '#f59e0b', bg: 'rgba(245,158,11,0.12)', text: '#f59e0b' },
            'fix':     { dot: '#ec4899', bg: 'rgba(236,72,153,0.12)', text: '#ec4899' },
            'chore':   { dot: '#6b7280', bg: 'rgba(107,114,128,0.12)', text: '#6b7280' },
            'docs':    { dot: '#3b82f6', bg: 'rgba(59,130,246,0.12)', text: '#3b82f6' },
            'test':    { dot: '#14b8a6', bg: 'rgba(20,184,166,0.12)', text: '#14b8a6' },
            'refactor':{ dot: '#f97316', bg: 'rgba(249,115,22,0.12)', text: '#f97316' },
            'style':   { dot: '#8b5cf6', bg: 'rgba(139,92,246,0.12)', text: '#8b5cf6' },
        };

        function getBranchColor(branch) {
            const prefix = branch.split('/')[0];
            if (BRANCH_COLORS[prefix]) return BRANCH_COLORS[prefix];
            const hue = (branch.split('').reduce((a,b)=>a+b.charCodeAt(0),0)*137) % 360;
            return { dot: `hsl(${hue},70%,50%)`, bg: `hsla(${hue},70%,50%,0.12)`, text: `hsl(${hue},70%,45%)` };
        }

        function initData() {
            nodes = [
                { id: 'main', type: 'main', parent: null, children: ['wt-0','wt-1','wt-2','wt-3'], branch: 'main', path: '~/project', head: 'a3f7d2e', status: 'clean', untracked: 0, modified: 0, commits: 142 },
                { id: 'wt-0', type: 'worktree', parent: 'main', children: [], branch: 'feature/auth', path: '~/project/.worktrees/feature-auth', head: 'b8c4e1f', status: 'dirty', untracked: 3, modified: 2, commits: 12 },
                { id: 'wt-1', type: 'worktree', parent: 'main', children: [], branch: 'hotfix/login', path: '~/project/.worktrees/hotfix-login', head: 'd2e5a9c', status: 'clean', untracked: 0, modified: 0, commits: 4 },
                { id: 'wt-2', type: 'worktree', parent: 'main', children: [], branch: 'develop', path: '~/project/.worktrees/develop', head: 'f1a8b3d', status: 'dirty', untracked: 1, modified: 5, commits: 28 },
                { id: 'wt-3', type: 'worktree', parent: 'main', children: [], branch: 'feature/ui-v2', path: '~/project/.worktrees/feature-ui-v2', head: 'e5c7d4a', status: 'clean', untracked: 0, modified: 0, commits: 8 }
            ];
            recalcLayout();

            // 默认选中根节点
            const root = nodes.find(n => n.type === 'main');
            if (root) {
                selectedNode = root;
                updateInfoPanel(root);
            }
        }

        function recalcLayout() {
            const root = nodes.find(n => n.type === 'main');
            if (!root) return;

            function layout(node, depth) {
                node.gy = depth * 2;
                if (!node.children || node.children.length === 0) return { minX: 0, maxX: 0 };

                let currentX = 0;
                let childBounds = [];

                for (const childId of node.children) {
                    const child = nodes.find(n => n.id === childId);
                    const res = layout(child, depth + 1);
                    const offset = currentX - res.minX;
                    shiftSubtree(child, offset);
                    const span = res.maxX - res.minX;
                    childBounds.push({ minX: currentX, maxX: currentX + span });
                    currentX += span + 2;
                }

                const left = childBounds[0].minX;
                const right = childBounds[childBounds.length - 1].maxX;
                node.gx = Math.round((left + right) / 2);
                return { minX: left, maxX: right };
            }

            layout(root, 0);

            const allX = nodes.map(n => n.gx);
            const offset = -Math.round((Math.min(...allX) + Math.max(...allX)) / 2);
            nodes.forEach(n => n.gx += offset);
        }

        function shiftSubtree(node, offset) {
            node.gx += offset;
            if (node.children) {
                for (const cid of node.children) {
                    const c = nodes.find(n => n.id === cid);
                    if (c) shiftSubtree(c, offset);
                }
            }
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            if (nodes.length === 0) initData();

            camera.x = width / 2;
            camera.y = height / 3;
        }

        function toScreen(gx, gy) {
            return {
                x: gx * CELL * camera.zoom + camera.x,
                y: gy * CELL * camera.zoom + camera.y
            };
        }

        function toGrid(sx, sy) {
            return {
                gx: Math.round((sx - camera.x) / (CELL * camera.zoom)),
                gy: Math.round((sy - camera.y) / (CELL * camera.zoom))
            };
        }

        function drawGrid() {
            const s = CELL * camera.zoom;
            const ox = camera.x % s;
            const oy = camera.y % s;
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(0,0,0,0.04)';
            for (let x = ox; x < width; x += s) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,height); ctx.stroke(); }
            for (let y = oy; y < height; y += s) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(width,y); ctx.stroke(); }
            ctx.strokeStyle = 'rgba(0,0,0,0.08)';
            for (let x = ox; x < width; x += s * 5) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,height); ctx.stroke(); }
            for (let y = oy; y < height; y += s * 5) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(width,y); ctx.stroke(); }
        }

        function drawLinks() {
            for (const node of nodes) {
                if (!node.children || node.children.length === 0) continue;
                const pPos = toScreen(node.gx, node.gy);
                const px = pPos.x + s / 2;
                const py = pPos.y + s - GAP;

                for (const cid of node.children) {
                    const child = nodes.find(n => n.id === cid);
                    if (!child) continue;
                    const cPos = toScreen(child.gx, child.gy);
                    const cx = cPos.x + s / 2;
                    const cy = cPos.y + GAP;
                    const midY = pPos.y + s + s / 2;

                    const isRel = selectedNode === node || selectedNode === child;
                    const color = isRel ? '#0071e3' : 'rgba(0,0,0,0.12)';
                    const lw = isRel ? 2.5 : 1.5;

                    ctx.save();
                    ctx.strokeStyle = color;
                    ctx.lineWidth = lw;
                    ctx.lineCap = 'butt';
                    ctx.lineJoin = 'miter';

                    const pts = [
                        { x: px, y: py },
                        { x: px, y: midY },
                        { x: cx, y: midY },
                        { x: cx, y: cy }
                    ];
                    if (node.gx === child.gx) pts.splice(2, 1);

                    ctx.beginPath();
                    ctx.moveTo(pts[0].x, pts[0].y);
                    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
                    ctx.stroke();

                    if (isRel) {
                        ctx.strokeStyle = 'rgba(0,113,227,0.06)';
                        ctx.lineWidth = lw + 8;
                        ctx.beginPath();
                        ctx.moveTo(pts[0].x, pts[0].y);
                        for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
                        ctx.stroke();
                    }
                    ctx.restore();
                }
            }
        }

        let s = CELL * camera.zoom;

        function drawNode(node) {
            const isSel = selectedNode === node;
            const isHov = hoveredNode === node;
            const isMain = node.type === 'main';
            const col = getBranchColor(node.branch);

            const pos = toScreen(node.gx, node.gy);
            s = CELL * camera.zoom;
            const x = pos.x + GAP;
            const y = pos.y + GAP;
            const w = s - GAP * 2;
            const h = s - GAP * 2;

            ctx.save();

            if (isMain) {
                ctx.fillStyle = isSel ? '#1e293b' : '#0f172a';
            } else {
                ctx.fillStyle = isSel ? 'rgba(0,113,227,0.04)' : '#ffffff';
            }
            ctx.fillRect(x, y, w, h);

            ctx.lineWidth = 1;
            if (isMain) {
                ctx.strokeStyle = isSel ? '#58a6ff' : '#1e293b';
            } else {
                ctx.strokeStyle = isSel ? '#0071e3' : (isHov ? 'rgba(0,0,0,0.15)' : 'rgba(0,0,0,0.08)');
            }
            ctx.strokeRect(x, y, w, h);

            if (isSel) {
                ctx.strokeStyle = isMain ? 'rgba(88,166,255,0.3)' : 'rgba(0,113,227,0.2)';
                ctx.strokeRect(pos.x + 0.5, pos.y + 0.5, s - 1, s - 1);
            }

            const dotR = 3.5 * camera.zoom;
            ctx.beginPath();
            ctx.arc(x + 8 * camera.zoom + dotR, y + 8 * camera.zoom + dotR, dotR, 0, Math.PI * 2);
            ctx.fillStyle = col.dot;
            ctx.fill();

            const txt = isMain ? '#f1f5f9' : '#1e293b';
            const txtSec = isMain ? '#94a3b8' : '#64748b';

            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `600 ${10 * camera.zoom}px -apple-system, sans-serif`;
            ctx.fillStyle = txt;
            let name = node.branch;
            if (name.length > 8) name = name.slice(0, 6) + '..';
            ctx.fillText(name, x + w / 2, y + h / 2 - 2 * camera.zoom);

            ctx.font = `500 ${8 * camera.zoom}px -apple-system, sans-serif`;
            ctx.fillStyle = txtSec;
            ctx.fillText(`${node.commits}`, x + w / 2, y + h / 2 + 10 * camera.zoom);

            if (isMain) {
                ctx.font = `700 ${7 * camera.zoom}px -apple-system, sans-serif`;
                ctx.fillStyle = '#58a6ff';
                ctx.fillText('MAIN', x + w / 2, y + h - 6 * camera.zoom);
            }

            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = '#f5f5f7';
            ctx.fillRect(0, 0, width, height);
            drawGrid();
            drawLinks();
            for (const n of nodes) drawNode(n);
        }

        function animate() {
            camera.zoom += (camera.targetZoom - camera.zoom) * 0.12;
            draw();
            requestAnimationFrame(animate);
        }

        function getMousePos(e) { return { x: e.clientX, y: e.clientY }; }

        function getNodeAt(pos) {
            const g = toGrid(pos.x, pos.y);
            for (const n of nodes) if (n.gx === g.gx && n.gy === g.gy) return n;
            return null;
        }

        function updateInfoPanel(node) {
            const panel = document.getElementById('infoPanel');
            if (!node) { panel.classList.remove('active'); return; }
            const isMain = node.type === 'main';
            document.getElementById('panelTitle').textContent = isMain ? 'Main Worktree' : 'Linked Worktree';
            document.getElementById('panelSubtitle').textContent = `单元格 [${node.gx}, ${node.gy}] · ${node.children.length} 个子节点`;
            const col = getBranchColor(node.branch);
            document.getElementById('panelBranch').innerHTML = `<span class="branch-tag" style="background:${col.bg};color:${col.text}">${node.branch}</span>`;
            document.getElementById('panelPath').textContent = node.path;
            document.getElementById('panelHead').textContent = node.head;
            const sc = node.status === 'clean' ? 'status-clean' : 'status-dirty';
            const st = node.status === 'clean' ? '工作区干净' : '有未提交更改';
            document.getElementById('panelStatus').innerHTML = `<span class="status-pill ${sc}"><span class="status-dot"></span>${st}</span>`;
            document.getElementById('panelUntracked').textContent = node.untracked;
            document.getElementById('panelModified').textContent = node.modified;
            panel.classList.add('active');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        canvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);
            const node = getNodeAt(pos);
            if (node) {
                selectedNode = node;
                updateInfoPanel(node);
                canvas.style.cursor = 'pointer';
            } else {
                isPanning = true;
                panStart = pos;
                canvas.style.cursor = 'grabbing';
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            if (isPanning) {
                camera.x += pos.x - panStart.x;
                camera.y += pos.y - panStart.y;
                panStart = pos;
            } else {
                const node = getNodeAt(pos);
                if (node !== hoveredNode) {
                    hoveredNode = node;
                    canvas.style.cursor = node ? 'pointer' : 'grab';
                }
            }
        });

        canvas.addEventListener('mouseup', () => {
            isPanning = false;
            canvas.style.cursor = hoveredNode ? 'pointer' : 'grab';
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const f = e.deltaY > 0 ? 0.9 : 1.1;
            camera.targetZoom = Math.max(0.4, Math.min(3, camera.targetZoom * f));
        });

        canvas.addEventListener('dblclick', (e) => {
            const pos = getMousePos(e);
            const node = getNodeAt(pos);
            if (node) showToast(`已切换到 ${node.branch}`);
        });

        function addNode() {
            if (!selectedNode) { showToast('请先选中一个节点'); return; }
            const parent = selectedNode;
            const prefixes = ['feature','hotfix','develop','release','fix','chore','docs','test','refactor','style'];
            const prefix = prefixes[Math.floor(Math.random() * prefixes.length)];
            const newId = `wt-${nodeCounter++}`;
            const newNode = {
                id: newId, type: 'worktree', parent: parent.id, children: [],
                branch: `${prefix}/new-${nodeCounter}`, path: `~/project/.worktrees/${prefix}-new-${nodeCounter}`,
                head: Math.random().toString(36).substring(2, 9),
                status: Math.random() > 0.5 ? 'clean' : 'dirty',
                untracked: Math.floor(Math.random() * 3), modified: Math.floor(Math.random() * 4), commits: 0
            };
            parent.children.push(newId);
            nodes.push(newNode);
            recalcLayout();
            updateInfoPanel(parent);
            showToast(`已添加 ${newNode.branch}`);
            document.getElementById('navCount').textContent = `${nodes.length - 1} 个工作树`;
        }

        function removeNode() {
            if (!selectedNode) { showToast('请先选中一个节点'); return; }
            if (selectedNode.type === 'main') { showToast('不能删除主节点'); return; }

            function collect(id) {
                const n = nodes.find(x => x.id === id);
                if (!n) return [];
                let ids = [id];
                for (const c of n.children) ids = ids.concat(collect(c));
                return ids;
            }

            const ids = collect(selectedNode.id);
            const par = nodes.find(n => n.id === selectedNode.parent);
            if (par) par.children = par.children.filter(x => x !== selectedNode.id);
            nodes = nodes.filter(n => !ids.includes(n.id));
            selectedNode = null;
            updateInfoPanel(null);
            recalcLayout();
            showToast(`已删除 ${ids.length} 个节点`);
            document.getElementById('navCount').textContent = `${nodes.length - 1} 个工作树`;
        }

        window.addEventListener('resize', resize);
        resize();
        animate();
    </script>
</body>
</html>
